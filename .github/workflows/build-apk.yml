name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - run: npm ci

      - name: Build web assets
        run: npm run build

      - run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=${GITHUB_SHA::7}
          APK_NAME="ebook-reader-v${VERSION}-${SHORT_SHA}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebook-reader-apk
          path: ${{ env.APK_NAME }}

      - name: Create or update release
        run: |
          # Create the release if it doesn't exist yet
          gh release create latest \
            --title "Latest Build" \
            --notes "Automated APK build from commit ${{ github.sha }}" \
            --prerelease \
            --latest 2>/dev/null || \
          gh release edit latest \
            --title "Latest Build" \
            --notes "Automated APK build from commit ${{ github.sha }}" \
            --prerelease \
            --latest
          # Upload APK, overwriting any existing asset with same name
          gh release upload latest "${{ env.APK_NAME }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
