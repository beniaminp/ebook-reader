name: Build React Native Signed APK

on:
  push:
    branches:
      - react-native-migration-plan
    paths:
      - 'shelfy-reader-rn/**'
      - '.github/workflows/build-rn-signed.yml'

permissions:
  contents: write

jobs:
  build-signed-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: shelfy-reader-rn/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        working-directory: shelfy-reader-rn
        run: npm ci

      - name: Prebuild Android project
        working-directory: shelfy-reader-rn
        run: npx expo prebuild --platform android --clean

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Compute version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "VERSION_NAME=${VERSION}" >> $GITHUB_ENV
          echo "VERSION_CODE=${COMMIT_COUNT}" >> $GITHUB_ENV

      - name: Configure signing
        working-directory: shelfy-reader-rn/android
        run: |
          cat >> gradle.properties <<PROPS
          MYAPP_UPLOAD_STORE_FILE=${{ runner.temp }}/release.jks
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      - name: Add signing config to build.gradle
        working-directory: shelfy-reader-rn/android/app
        run: |
          # Insert signingConfigs and apply to release buildType
          sed -i '/android {/a \
              signingConfigs {\
                  release {\
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)\
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD\
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS\
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD\
                  }\
              }' build.gradle

          sed -i '/buildTypes {/,/release {/ { /release {/a \
                      signingConfig signingConfigs.release
          }' build.gradle

      - name: Build release APK
        working-directory: shelfy-reader-rn/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          APK_SRC=$(find shelfy-reader-rn/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME="shelfy-reader-rn-v${{ env.VERSION_NAME }}-${SHORT_SHA}-signed.apk"
          cp "$APK_SRC" "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelfy-reader-rn-signed-apk
          path: ${{ env.APK_NAME }}

      - name: Create or update pre-release
        run: |
          TAG="rn-latest"
          gh release create "$TAG" \
            --title "React Native Build (Latest)" \
            --notes "React Native signed APK from commit ${{ github.sha }}" \
            --prerelease 2>/dev/null || \
          gh release edit "$TAG" \
            --title "React Native Build (Latest)" \
            --notes "React Native signed APK from commit ${{ github.sha }}" \
            --prerelease
          gh release upload "$TAG" "$APK_NAME" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
